<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказы — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #020817;
      --bg1:      rgba(12,20,69,0.5);
      --bg2:      rgba(5,12,35,0.7);
      --border:   rgba(59,130,246,0.15);
      --border-h: rgba(59,130,246,0.4);
      --accent:   #3b82f6;
      --cyan:     #06b6d4;
      --text:     #e2f0ff;
      --text2:    #93b4d4;
      --text3:    #4a6a8a;
      --green:    #10b981;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --purple:   #a855f7;
    }
    html, body { min-height: 100vh; font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #020817 0%, #0c1445 50%, #0a1628 100%) fixed;
      color: var(--text); }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: inherit; }

    /* ── Setup overlay ── */
    .setup-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(2,8,23,.97);
      backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
    .setup-overlay.hidden { display: none; }
    .setup-card { background: rgba(12,20,69,.9); border: 1px solid rgba(59,130,246,.25);
      border-radius: 18px; padding: 40px; width: 100%; max-width: 420px; }
    .setup-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .setup-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
    .f-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 6px; display: block; }
    .f-input { width: 100%; background: rgba(5,12,35,.8); border: 1px solid rgba(59,130,246,.2);
      border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px;
      outline: none; margin-bottom: 16px; transition: border-color .18s; }
    .f-input:focus { border-color: var(--accent); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--cyan));
      color: #fff; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 700;
      transition: opacity .18s; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Header / Nav ── */
    .nav { padding: 0 40px; height: 62px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border); backdrop-filter: blur(14px);
      position: sticky; top: 0; z-index: 100; background: rgba(2,8,23,.85); }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-right: 12px; }
    .nav-logo-icon { width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      display: flex; align-items: center; justify-content: center; font-weight: 900;
      font-size: 15px; color: #fff; -webkit-text-fill-color: #fff; }
    .nav-link { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
      color: var(--text3); transition: all .18s; }
    .nav-link:hover { background: rgba(255,255,255,.05); color: var(--text2); }
    .nav-link.active { color: var(--accent); background: rgba(59,130,246,.1); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .save-status { font-size: 12px; color: var(--text3); }
    .save-status.ok  { color: var(--green); }
    .save-status.err { color: var(--red); }

    /* ── Toolbar ── */
    .toolbar { padding: 20px 40px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .page-title { font-size: 22px; font-weight: 800; margin-right: 8px; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .search-input { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; color: var(--text); font-size: 13px; outline: none; width: 200px;
      transition: border-color .18s; }
    .search-input:focus { border-color: var(--border-h); }
    .filter-select { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; color: var(--text2); font-size: 13px; outline: none;
      cursor: pointer; transition: border-color .18s; }
    .filter-select:focus { border-color: var(--border-h); }
    .btn-new { background: linear-gradient(135deg, var(--accent), var(--cyan));
      color: #fff; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 700;
      transition: opacity .18s; }
    .btn-new:hover { opacity: .88; }

    /* ── Grid ── */
    .main { padding: 0 40px 60px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .empty { text-align: center; padding: 80px 0; color: var(--text3); font-size: 14px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }

    /* ── Card ── */
    .card { background: var(--bg1); border: 1px solid var(--border); border-radius: 16px;
      padding: 24px; backdrop-filter: blur(16px); transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative; cursor: grab; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 16px 16px 0 0; }
    .card.priority-high::before  { background: linear-gradient(135deg, #ef4444, #f97316); }
    .card.priority-medium::before { background: linear-gradient(135deg, #f59e0b, #eab308); }
    .card.priority-low::before   { background: linear-gradient(135deg, #10b981, #06b6d4); }
    .card:hover { border-color: var(--border-h); box-shadow: 0 8px 40px rgba(59,130,246,.15);
      transform: translateY(-2px); }
    .card.dragging { opacity: .5; cursor: grabbing; }
    .card.drag-over { border-color: var(--accent); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .card-name { font-size: 17px; font-weight: 800; letter-spacing: -.02em; }
    .card-client { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
    .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; color: var(--text3); transition: all .18s; }
    .icon-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }

    .card-price { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 10px; }
    .card-price .currency { font-size: 13px; font-weight: 500; color: var(--text3); margin-left: 3px; }

    .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .badge.new         { background: rgba(59,130,246,.12); color: var(--accent); border: 1px solid rgba(59,130,246,.25); }
    .badge.in_progress { background: rgba(245,158,11,.12); color: var(--yellow); border: 1px solid rgba(245,158,11,.25); }
    .badge.done        { background: rgba(16,185,129,.12); color: var(--green); border: 1px solid rgba(16,185,129,.25); }
    .badge.cancelled   { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
    .badge.paid        { background: rgba(16,185,129,.12); color: var(--green); border: 1px solid rgba(16,185,129,.25); }
    .badge.unpaid      { background: rgba(239,68,68,.08); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .badge.priority-high   { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
    .badge.priority-medium { background: rgba(245,158,11,.12); color: var(--yellow); border: 1px solid rgba(245,158,11,.25); }
    .badge.priority-low    { background: rgba(16,185,129,.12); color: var(--green); border: 1px solid rgba(16,185,129,.25); }

    .deadline-row { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 10px; }
    .deadline-row .dl-label { color: var(--text3); }
    .deadline-row .dl-val { font-weight: 600; }
    .deadline-row .dl-val.overdue { color: var(--red); }
    .deadline-row .dl-val.soon    { color: var(--yellow); }
    .deadline-row .dl-val.ok      { color: var(--green); }

    .card-desc { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .card-attachments { display: flex; flex-wrap: wrap; gap: 5px; }
    .attach-chip { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
      background: rgba(59,130,246,.08); border: 1px solid var(--border);
      color: var(--text2); transition: all .18s; }
    .attach-chip:hover { background: rgba(59,130,246,.18); color: var(--text); }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
      padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: #060f2e; border: 1px solid rgba(59,130,246,.25); border-radius: 18px;
      width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 32px; }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 24px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 11px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%; background: rgba(5,12,35,.8); border: 1px solid rgba(59,130,246,.2);
      border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px;
      outline: none; transition: border-color .18s; }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--accent); }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }
    .form-check { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .form-check input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }
    .form-check label { font-size: 13px; color: var(--text2); cursor: pointer; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel { background: rgba(255,255,255,.06); color: var(--text2); border-radius: 8px;
      padding: 9px 20px; font-size: 13px; font-weight: 600; transition: all .18s; }
    .btn-cancel:hover { background: rgba(255,255,255,.1); }
    .btn-save { background: linear-gradient(135deg, var(--accent), var(--cyan));
      color: #fff; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 700;
      transition: opacity .18s; }
    .btn-save:hover { opacity: .88; }
    .btn-danger { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; margin-right: auto;
      transition: all .18s; }
    .btn-danger:hover { background: rgba(239,68,68,.25); }

    /* attachments in modal */
    .attach-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .attach-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: rgba(5,12,35,.6); border: 1px solid rgba(59,130,246,.1); border-radius: 8px; }
    .attach-item .attach-label { font-size: 13px; font-weight: 600; flex-shrink: 0; min-width: 80px; }
    .attach-item .attach-url { font-size: 12px; color: var(--text3); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-item a { color: var(--accent); }
    .attach-del { color: var(--text3); font-size: 14px; flex-shrink: 0; transition: color .18s; }
    .attach-del:hover { color: var(--red); }
    .attach-add-row { display: grid; grid-template-columns: 1fr 2fr auto; gap: 8px; }
    .attach-add-row input { margin: 0; }
    .btn-sm { padding: 8px 14px; font-size: 12px; font-weight: 700; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--cyan)); color: #fff; transition: opacity .18s; }
    .btn-sm:hover { opacity: .88; }

    /* history */
    .history-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .history-item { font-size: 11px; color: var(--text3); padding: 4px 10px;
      background: rgba(5,12,35,.4); border-radius: 6px; }

    /* section separator */
    .form-section { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase;
      letter-spacing: .1em; padding-bottom: 8px; border-bottom: 1px solid rgba(59,130,246,.1);
      margin-bottom: 16px; margin-top: 4px; }

    /* toast */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: #060f2e; border: 1px solid rgba(59,130,246,.3); border-radius: 10px;
      padding: 12px 20px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transform: translateY(80px); opacity: 0; transition: all .3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok  { border-color: rgba(16,185,129,.4); color: var(--green); }
    .toast.err { border-color: rgba(239,68,68,.4); color: var(--red); }

    @media(max-width:600px) {
      .nav { padding: 0 16px; } .toolbar { padding: 16px; } .main { padding: 0 16px 60px; }
      .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
      .attach-add-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-card">
    <div class="setup-title">🔑 Настройка хранилища</div>
    <div class="setup-sub">Введи данные GitHub чтобы хранить проекты и заказы в приватном репо</div>
    <label class="f-label">GitHub Token (repo scope)</label>
    <input class="f-input" id="cfgToken" type="password" placeholder="ghp_xxxx...">
    <label class="f-label">GitHub Username</label>
    <input class="f-input" id="cfgOwner" type="text" placeholder="asmodeusss111">
    <label class="f-label">Приватное репо (только название)</label>
    <input class="f-input" id="cfgRepo" type="text" placeholder="admin-data">
    <button class="btn-primary" id="cfgSave" style="width:100%">Подключить</button>
    <div id="cfgError" style="color:#ef4444;font-size:12px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">A</div>
    Admin
  </div>
  <a class="nav-link" href="index.html">Dashboard</a>
  <a class="nav-link" href="projects.html">Проекты</a>
  <a class="nav-link active" href="orders.html">Заказы</a>
  <div class="nav-right">
    <span class="save-status" id="saveStatus">—</span>
    <button class="btn-primary" style="padding:6px 14px;font-size:12px" onclick="openSetup()">⚙ Настройки</button>
  </div>
</nav>

<!-- Toolbar -->
<div class="toolbar">
  <span class="page-title">💼 Заказы</span>
  <div class="toolbar-right">
    <input class="search-input" id="searchInput" placeholder="🔍 Поиск..." oninput="renderCards()">
    <select class="filter-select" id="filterStatus" onchange="renderCards()">
      <option value="">Все статусы</option>
      <option value="new">Новый</option>
      <option value="in_progress">В работе</option>
      <option value="done">Готово</option>
      <option value="cancelled">Отменён</option>
    </select>
    <select class="filter-select" id="filterPriority" onchange="renderCards()">
      <option value="">Все приоритеты</option>
      <option value="high">Высокий</option>
      <option value="medium">Средний</option>
      <option value="low">Низкий</option>
    </select>
    <select class="filter-select" id="filterPaid" onchange="renderCards()">
      <option value="">Оплата: все</option>
      <option value="paid">Оплачено</option>
      <option value="unpaid">Не оплачено</option>
    </select>
    <select class="filter-select" id="sortBy" onchange="renderCards()">
      <option value="order">Свой порядок</option>
      <option value="deadline">По дедлайну</option>
      <option value="price_desc">Цена ↓</option>
      <option value="price_asc">Цена ↑</option>
      <option value="date">По дате</option>
      <option value="priority">По приоритету</option>
    </select>
    <button class="btn-new" onclick="openModal()">+ Добавить</button>
  </div>
</div>

<!-- Grid -->
<div class="main">
  <div class="grid" id="grid"></div>
  <div class="empty hidden" id="empty">
    <div class="empty-icon">📋</div>
    <div>Заказов пока нет. Добавь первый!</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Новый заказ</div>

    <div class="form-section">Основное</div>
    <div class="form-grid-2">
      <div class="form-row"><label>Название / проект</label><input id="fName" placeholder="Сайт под ключ"></div>
      <div class="form-row"><label>Клиент</label><input id="fClient" placeholder="Иван Иванов"></div>
    </div>
    <div class="form-grid-3">
      <div class="form-row"><label>Сумма</label><input id="fPrice" type="number" min="0" placeholder="0"></div>
      <div class="form-row">
        <label>Валюта</label>
        <select id="fCurrency">
          <option value="USD">USD</option>
          <option value="RUB">RUB</option>
          <option value="EUR">EUR</option>
          <option value="KZT">KZT</option>
          <option value="UAH">UAH</option>
          <option value="BTC">BTC</option>
          <option value="USDT">USDT</option>
        </select>
      </div>
      <div class="form-row"><label>Дедлайн</label><input id="fDeadline" type="date"></div>
    </div>
    <div class="form-grid-2">
      <div class="form-row">
        <label>Статус</label>
        <select id="fStatus">
          <option value="new">Новый</option>
          <option value="in_progress">В работе</option>
          <option value="done">Готово</option>
          <option value="cancelled">Отменён</option>
        </select>
      </div>
      <div class="form-row">
        <label>Приоритет</label>
        <select id="fPriority">
          <option value="medium">Средний</option>
          <option value="high">Высокий</option>
          <option value="low">Низкий</option>
        </select>
      </div>
    </div>
    <div class="form-check">
      <input type="checkbox" id="fPaid">
      <label for="fPaid">Оплачено</label>
    </div>

    <div class="form-section">Описание и заметки</div>
    <div class="form-row"><label>Описание</label><textarea id="fDesc" placeholder="Что нужно сделать..."></textarea></div>
    <div class="form-row"><label>Заметки / ТЗ</label><textarea id="fNotes" placeholder="Детали, пожелания клиента..."></textarea></div>

    <div class="form-section">Файлы и ссылки</div>
    <div class="attach-list" id="attachList"></div>
    <div class="attach-add-row">
      <input class="f-input" id="attachLabel" placeholder="Название" style="margin:0"
             onkeydown="if(event.key==='Enter')addAttach()">
      <input class="f-input" id="attachUrl" placeholder="https://..." style="margin:0"
             onkeydown="if(event.key==='Enter')addAttach()">
      <button class="btn-sm" onclick="addAttach()">+</button>
    </div>

    <div class="form-row" id="historyBlock" style="display:none;margin-top:16px">
      <label>История статусов</label>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-danger hidden" id="btnDelete" onclick="deleteOrder()">🗑 Удалить</button>
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveOrder()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/github-api.js"></script>
<script>
let data = { projects: [], orders: [], lastUpdated: '' };
let editId = null;
let modalAttachments = [];
let dragSrc = null;

const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!isConfigured()) { document.getElementById('setupOverlay').classList.remove('hidden'); return; }
  document.getElementById('setupOverlay').classList.add('hidden');
  setSaveStatus('Загрузка...', '');
  try {
    data = await getStorage().init();
    renderCards();
    setSaveStatus('Загружено', 'ok');
  } catch(e) {
    setSaveStatus('Ошибка загрузки', 'err');
    showToast('Ошибка: ' + e.message, 'err');
  }
}

// Setup
document.getElementById('cfgSave').onclick = async () => {
  const token = document.getElementById('cfgToken').value.trim();
  const owner = document.getElementById('cfgOwner').value.trim();
  const repo  = document.getElementById('cfgRepo').value.trim();
  if (!token || !owner || !repo) { document.getElementById('cfgError').textContent = 'Заполни все поля'; return; }
  document.getElementById('cfgError').textContent = '';
  document.getElementById('cfgSave').disabled = true;
  document.getElementById('cfgSave').textContent = 'Проверяем...';
  setConfig({ token, owner, repo });
  resetStorage();
  try {
    data = await getStorage().init();
    document.getElementById('setupOverlay').classList.add('hidden');
    renderCards();
    setSaveStatus('Подключено', 'ok');
  } catch(e) {
    document.getElementById('cfgError').textContent = 'Ошибка: ' + e.message;
    document.getElementById('cfgSave').disabled = false;
    document.getElementById('cfgSave').textContent = 'Подключить';
  }
};

function openSetup() {
  const c = getConfig();
  document.getElementById('cfgOwner').value = c.owner;
  document.getElementById('cfgRepo').value  = c.repo;
  document.getElementById('setupOverlay').classList.remove('hidden');
}

// ── Render ────────────────────────────────────────────────────────────────────
function getFiltered() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const st   = document.getElementById('filterStatus').value;
  const pri  = document.getElementById('filterPriority').value;
  const paid = document.getElementById('filterPaid').value;
  const sort = document.getElementById('sortBy').value;

  let list = [...(data.orders || [])];
  if (q)   list = list.filter(o => o.name.toLowerCase().includes(q) || (o.client||'').toLowerCase().includes(q) || (o.description||'').toLowerCase().includes(q));
  if (st)  list = list.filter(o => o.status === st);
  if (pri) list = list.filter(o => o.priority === pri);
  if (paid === 'paid')   list = list.filter(o => o.paid);
  if (paid === 'unpaid') list = list.filter(o => !o.paid);

  if (sort === 'deadline')   list.sort((a,b) => (a.deadline||'9999') < (b.deadline||'9999') ? -1 : 1);
  else if (sort === 'price_desc') list.sort((a,b) => (b.price||0) - (a.price||0));
  else if (sort === 'price_asc')  list.sort((a,b) => (a.price||0) - (b.price||0));
  else if (sort === 'date')       list.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  else if (sort === 'priority')   list.sort((a,b) => (PRIORITY_ORDER[a.priority]||1) - (PRIORITY_ORDER[b.priority]||1));
  else                            list.sort((a,b) => (a.order||0) - (b.order||0));
  return list;
}

function deadlineDisplay(dateStr) {
  const days = daysUntil(dateStr);
  if (days === null) return null;
  if (days < 0)  return { label: `Просрочен на ${-days} дн.`, cls: 'overdue' };
  if (days === 0) return { label: 'Сегодня!', cls: 'overdue' };
  if (days <= 3) return { label: `Через ${days} дн.`, cls: 'soon' };
  return { label: new Date(dateStr).toLocaleDateString('ru'), cls: 'ok' };
}

function renderCards() {
  const list  = getFiltered();
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!list.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  const statusLabel = { new: 'Новый', in_progress: 'В работе', done: 'Готово', cancelled: 'Отменён' };
  const priorityLabel = { high: '🔴 Высокий', medium: '🟡 Средний', low: '🟢 Низкий' };

  grid.innerHTML = list.map(o => {
    const dl    = o.deadline ? deadlineDisplay(o.deadline) : null;
    const attaches = (o.attachments||[]).slice(0,4)
      .map(a => `<a class="attach-chip" href="${esc(a.url)}" target="_blank">${esc(a.label)}</a>`).join('');
    const priceStr = o.price ? `${Number(o.price).toLocaleString('ru')}<span class="currency">${esc(o.currency||'USD')}</span>` : '—';

    return `
    <div class="card priority-${o.priority||'medium'}" draggable="true" data-id="${o.id}"
         ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event)" ondragleave="dragLeave(event)">
      <div class="card-top">
        <div class="card-name">${esc(o.name)}</div>
        <div class="card-actions">
          <button class="icon-btn" onclick="openModal('${o.id}')" title="Редактировать">✏️</button>
        </div>
      </div>
      ${o.client ? `<div class="card-client">👤 ${esc(o.client)}</div>` : ''}
      <div class="card-price">${priceStr}</div>
      <div class="card-meta">
        <span class="badge ${o.status}">${statusLabel[o.status]||o.status}</span>
        <span class="badge priority-${o.priority||'medium'}">${priorityLabel[o.priority||'medium']}</span>
        <span class="badge ${o.paid?'paid':'unpaid'}">${o.paid?'Оплачено':'Не оплачено'}</span>
      </div>
      ${dl ? `<div class="deadline-row"><span class="dl-label">⏰ Дедлайн:</span><span class="dl-val ${dl.cls}">${dl.label}</span></div>` : ''}
      ${o.description ? `<div class="card-desc">${esc(o.description)}</div>` : ''}
      ${attaches ? `<div class="card-attachments">${attaches}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id || null;
  modalAttachments = [];
  const o = id ? (data.orders||[]).find(x => x.id === id) : null;

  document.getElementById('modalTitle').textContent = o ? 'Редактировать заказ' : 'Новый заказ';
  document.getElementById('fName').value        = o?.name        || '';
  document.getElementById('fClient').value      = o?.client      || '';
  document.getElementById('fPrice').value       = o?.price       || '';
  document.getElementById('fCurrency').value    = o?.currency    || 'USD';
  document.getElementById('fDeadline').value    = o?.deadline    || '';
  document.getElementById('fStatus').value      = o?.status      || 'new';
  document.getElementById('fPriority').value    = o?.priority    || 'medium';
  document.getElementById('fPaid').checked      = o?.paid        || false;
  document.getElementById('fDesc').value        = o?.description || '';
  document.getElementById('fNotes').value       = o?.notes       || '';
  modalAttachments = JSON.parse(JSON.stringify(o?.attachments || []));
  renderModalAttachments();

  const histBlock = document.getElementById('historyBlock');
  const hist = o?.statusHistory || [];
  if (hist.length) {
    histBlock.style.display = '';
    document.getElementById('historyList').innerHTML = hist.slice().reverse().map(h =>
      `<div class="history-item">${h.from} → ${h.to} · ${relTime(h.at)}</div>`
    ).join('');
  } else { histBlock.style.display = 'none'; }

  document.getElementById('btnDelete').classList.toggle('hidden', !o);
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('fName').focus();
}

function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); editId = null; }

function renderModalAttachments() {
  document.getElementById('attachList').innerHTML = modalAttachments.map((a, i) => `
    <div class="attach-item">
      <span class="attach-label">${esc(a.label)}</span>
      <a class="attach-url" href="${esc(a.url)}" target="_blank">${esc(a.url)}</a>
      <button class="attach-del" onclick="modalAttachments.splice(${i},1);renderModalAttachments()">✕</button>
    </div>`).join('');
}

function addAttach() {
  const label = document.getElementById('attachLabel').value.trim();
  const url   = document.getElementById('attachUrl').value.trim();
  if (!label || !url) return;
  modalAttachments.push({ label, url });
  document.getElementById('attachLabel').value = '';
  document.getElementById('attachUrl').value   = '';
  renderModalAttachments();
  document.getElementById('attachLabel').focus();
}

async function saveOrder() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('Введи название', 'err'); return; }

  const oldStatus = editId ? (data.orders||[]).find(x => x.id === editId)?.status : null;
  const newStatus = document.getElementById('fStatus').value;

  const order = {
    id:          editId || uid(),
    name,
    client:      document.getElementById('fClient').value.trim(),
    price:       parseFloat(document.getElementById('fPrice').value) || 0,
    currency:    document.getElementById('fCurrency').value,
    deadline:    document.getElementById('fDeadline').value || null,
    status:      newStatus,
    priority:    document.getElementById('fPriority').value,
    paid:        document.getElementById('fPaid').checked,
    description: document.getElementById('fDesc').value.trim(),
    notes:       document.getElementById('fNotes').value.trim(),
    attachments: modalAttachments,
    order:       editId ? ((data.orders||[]).find(x=>x.id===editId)?.order ?? (data.orders||[]).length) : (data.orders||[]).length,
    createdAt:   editId ? ((data.orders||[]).find(x=>x.id===editId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    statusHistory: editId ? [...((data.orders||[]).find(x=>x.id===editId)?.statusHistory || [])] : [],
  };

  if (oldStatus && oldStatus !== newStatus) {
    order.statusHistory.push({ from: oldStatus, to: newStatus, at: new Date().toISOString() });
  }

  if (!data.orders) data.orders = [];
  if (editId) {
    const idx = data.orders.findIndex(x => x.id === editId);
    data.orders[idx] = order;
  } else {
    data.orders.push(order);
  }

  closeModal();
  renderCards();
  await persist();
}

async function deleteOrder() {
  if (!editId) return;
  if (!confirm('Удалить заказ?')) return;
  data.orders = (data.orders||[]).filter(x => x.id !== editId);
  closeModal();
  renderCards();
  await persist();
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
function dragStart(e) { dragSrc = e.currentTarget.dataset.id; e.currentTarget.classList.add('dragging'); }
function dragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  e.currentTarget.classList.remove('drag-over');
  if (!dragSrc || dragSrc === targetId) return;

  if (!data.orders) data.orders = [];
  const srcIdx = data.orders.findIndex(x => x.id === dragSrc);
  const tgtIdx = data.orders.findIndex(x => x.id === targetId);
  const [item] = data.orders.splice(srcIdx, 1);
  data.orders.splice(tgtIdx, 0, item);
  data.orders.forEach((o, i) => o.order = i);
  dragSrc = null;
  renderCards();
  persist();
}
document.addEventListener('dragend', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging', 'drag-over'));
});

// ── Persist ───────────────────────────────────────────────────────────────────
async function persist() {
  setSaveStatus('Сохранение...', '');
  try {
    await getStorage().save(data);
    setSaveStatus('Сохранено ✓', 'ok');
    showToast('Сохранено', 'ok');
  } catch(e) {
    setSaveStatus('Ошибка сохранения', 'err');
    showToast('Ошибка: ' + e.message, 'err');
  }
}

function setSaveStatus(text, cls) {
  const el = document.getElementById('saveStatus');
  el.textContent = text;
  el.className = 'save-status ' + cls;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
